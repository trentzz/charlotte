{{define "content"}}
<div class="error-page">
    <div class="error-page__code">{{.Code}}</div>
    <h1>{{if eq .Code 404}}Page not found{{else if eq .Code 403}}Access denied{{else}}Something went wrong{{end}}</h1>
    <p>{{.Message}}</p>
    <a href="/" class="btn btn-primary">Go home</a>
</div>
{{end}}
