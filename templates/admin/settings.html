{{define "content"}}
<div class="container">
    <div class="admin-header">
        <a href="/admin/">Admin</a> &rsaquo; Settings
    </div>

    {{if .Flash}}<div class="alert alert-neutral">{{.Flash}}</div>{{end}}

    <div class="section-header">
        <h1>Site settings</h1>
    </div>

    <div class="card" style="max-width: 40rem;">
        <form method="POST" action="/admin/settings">
            <input type="hidden" name="_csrf" value="{{.CSRF}}">
            <div class="form-group">
                <label class="form-label">Site name</label>
                <input class="form-control" type="text" name="site_name"
                       value="{{.Settings.SiteName}}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Site description</label>
                <input class="form-control" type="text" name="site_description"
                       value="{{.Settings.SiteDescription}}"
                       placeholder="A short tagline shown on the landing page">
            </div>
            <div class="form-group">
                <label class="form-check">
                    <input type="checkbox" name="registration_open" value="1"
                           {{if .Settings.RegistrationOpen}}checked{{end}}>
                    <span>Registration open (allow new sign-ups)</span>
                </label>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save settings</button>
            </div>
        </form>
    </div>
</div>
{{end}}
