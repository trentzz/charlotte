{{define "head"}}
<link rel="stylesheet" href="/static/css/quill.snow.css">
{{end}}

{{define "content"}}
<div class="container">
    <div class="dash-layout">
        <nav class="dash-sidebar">
            <div class="dash-sidebar__title">Navigation</div>
            <ul class="dash-nav">
                <li><a href="/dashboard/">Overview</a></li>
                <li><a href="/dashboard/profile">Profile</a></li>
                <li><a href="/dashboard/blog/">Blog</a></li>
                <li><a href="/dashboard/about" class="active">About page</a></li>
                <li><a href="/dashboard/gallery/">Gallery</a></li>
                <li><a href="/dashboard/recipes/">Recipes</a></li>
            </ul>
        </nav>

        <div>
            {{if .Flash}}<div class="alert alert-neutral">{{.Flash}}</div>{{end}}

            <div class="section-header">
                <h1>About page</h1>
                {{if .Profile.FeatureAbout}}
                <a href="/u/{{.Profile.Username}}/about" class="btn btn-ghost btn-sm">View →</a>
                {{end}}
            </div>

            <div class="card">
                <form method="POST" action="/dashboard/about" id="about-form">
                    <input type="hidden" name="_csrf" value="{{.CSRF}}">
                    <div class="form-group">
                        <label class="form-label">Content</label>
                        <div id="editor-initial-content" style="display:none">{{.ContentForEditor}}</div>
                        <input type="hidden" name="content" id="content-input">
                        <div id="quill-editor"></div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/js/quill.min.js"></script>
<script>
(function () {
    var editorEl = document.getElementById('quill-editor');
    if (!editorEl) return;

    function getCSRF() {
        var t = document.querySelector('#about-form input[name="_csrf"]');
        return t ? t.value : '';
    }

    var quill = new Quill('#quill-editor', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['link', 'image'],
                    ['clean']
                ],
                handlers: {
                    image: function () {
                        var input = document.createElement('input');
                        input.type = 'file';
                        input.accept = 'image/jpeg,image/png,image/webp,image/gif';
                        input.click();
                        input.onchange = function () {
                            var file = input.files[0];
                            if (!file) return;
                            var form = new FormData();
                            form.append('image', file);
                            form.append('_csrf', getCSRF());
                            fetch('/dashboard/blog/image', { method: 'POST', body: form })
                                .then(function (r) { return r.json(); })
                                .then(function (d) {
                                    if (d.error) { alert(d.error); return; }
                                    var range = quill.getSelection(true);
                                    quill.insertEmbed(range ? range.index : 0, 'image', d.data.filePath, 'user');
                                })
                                .catch(function () { alert('Upload failed. Check the file type and size.'); });
                        };
                    }
                }
            }
        }
    });

    var initEl = document.getElementById('editor-initial-content');
    if (initEl && initEl.innerHTML.trim()) {
        quill.clipboard.dangerouslyPasteHTML(initEl.innerHTML);
    }

    document.getElementById('about-form').addEventListener('submit', function () {
        document.getElementById('content-input').value = quill.getSemanticHTML();
    });
}());
</script>
{{end}}
