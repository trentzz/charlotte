{{define "content"}}
<div class="auth-layout">
    <div class="auth-box">
        <h1>Create an account</h1>
        <p class="auth-box__sub">Start building your personal page.</p>

        {{if .Flash}}
        <div class="alert alert-neutral">{{.Flash}}</div>
        {{end}}

        <form method="POST" action="/register">
            <input type="hidden" name="_csrf" value="{{.CSRF}}">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <span class="form-label-hint">3–32 characters: letters, digits, hyphens, underscores.</span>
                <input class="form-control" type="text" id="username" name="username"
                       autocomplete="username" pattern="[a-zA-Z0-9_\-]{3,32}" autofocus required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" type="email" id="email" name="email"
                       autocomplete="email" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <span class="form-label-hint">At least 8 characters.</span>
                <input class="form-control" type="password" id="password" name="password"
                       autocomplete="new-password" minlength="8" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm password</label>
                <input class="form-control" type="password" id="confirm_password" name="confirm_password"
                       autocomplete="new-password" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Create account</button>
        </form>

        <p class="auth-box__footer">
            Already have an account? <a href="/login">Log in</a>
        </p>
    </div>
</div>
{{end}}
