{{define "content"}}
<div class="auth-layout">
    <div class="auth-box">
        <h1>Welcome back</h1>
        <p class="auth-box__sub">Log in to your account.</p>

        {{if .Flash}}
        <div class="alert alert-neutral">{{.Flash}}</div>
        {{end}}

        <form method="POST" action="/login">
            <input type="hidden" name="_csrf" value="{{.CSRF}}">
            <div class="form-group">
                <label class="form-label" for="identifier">Username or email</label>
                <input class="form-control" type="text" id="identifier" name="identifier"
                       autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Log in</button>
        </form>

        <p class="auth-box__footer">
            No account? <a href="/register">Sign up</a>
        </p>
    </div>
</div>
{{end}}
